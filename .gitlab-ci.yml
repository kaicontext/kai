# GitLab CI for Kailab
# Builds and deploys to GKE on merge to main

stages:
  - test
  - correctness
  - build
  - release
  - deploy

variables:
  # Image names (Artifact Registry)
  KAILAB_IMAGE: us-central1-docker.pkg.dev/$GCP_PROJECT_ID/preplan/kailab
  KAILAB_CONTROL_IMAGE: us-central1-docker.pkg.dev/$GCP_PROJECT_ID/preplan/kailab-control

# Reusable GCP auth (key is base64 encoded)
.gcp_auth: &gcp_auth
  - apk add --no-cache docker-cli
  - echo "$GCP_SERVICE_KEY" | base64 -d > /tmp/gcp-key.json
  - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
  - gcloud config set project $GCP_PROJECT_ID
  - gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

.gke_auth: &gke_auth
  - gcloud components install kubectl gke-gcloud-auth-plugin --quiet
  - gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE

# Test kai-cli (needs CGO for tree-sitter)
test:kai-cli:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd kai-cli
    - CGO_ENABLED=1 go test ./...

# Test kai-core (needs CGO for tree-sitter)
test:kai-core:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd kai-core
    - CGO_ENABLED=1 go test ./...

# Test kailab (needs CGO for sqlite)
test:kailab:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd kailab
    - CGO_ENABLED=1 go test ./...

# Test kailab-control
test:kailab-control:
  stage: test
  image: golang:1.24-alpine
  script:
    - cd kailab-control
    - go test ./...

# Correctness: regression tests (graph, selection, shadow, flaky, CLI, perf)
correctness:regression:
  stage: correctness
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
  script:
    - cd kai-cli
    - CGO_ENABLED=1 go test ./cmd/kai/
      -run "TestGraph_|TestSelection_|TestFalseNeg_|TestShadow_|TestFlaky_|TestCLI_|TestPerf_"
      -v -count=1 -timeout 120s 2>&1 | tee /tmp/regression.log
  artifacts:
    when: always
    paths:
      - /tmp/regression.log
    expire_in: 2 weeks

# Correctness: determinism (same input twice = identical graph)
correctness:determinism:
  stage: correctness
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git sqlite
  script:
    - cd kai-cli
    - CGO_ENABLED=1 go build -o /tmp/kai ./cmd/kai
    - mkdir -p /tmp/fixture/src /tmp/fixture/tests
    - |
      cat > /tmp/fixture/src/utils.ts << 'EOF'
      export function add(a: number, b: number) { return a + b; }
      export function multiply(a: number, b: number) { return a * b; }
      EOF
    - |
      cat > /tmp/fixture/src/app.ts << 'EOF'
      import { add, multiply } from './utils';
      export const sum = add(1, 2);
      export const product = multiply(3, 4);
      EOF
    - |
      cat > /tmp/fixture/tests/app.test.ts << 'EOF'
      import { sum, product } from '../src/app';
      test('sum', () => expect(sum).toBe(3));
      test('product', () => expect(product).toBe(12));
      EOF
    - cp -r /tmp/fixture /tmp/run1 && cd /tmp/run1 && /tmp/kai init && /tmp/kai capture .
    - sqlite3 /tmp/run1/.kai/db.sqlite "SELECT kind, payload FROM nodes ORDER BY kind, payload" > /tmp/nodes1.txt
    - sqlite3 /tmp/run1/.kai/db.sqlite "SELECT src, type, dst FROM edges ORDER BY src, type, dst" > /tmp/edges1.txt
    - cp -r /tmp/fixture /tmp/run2 && cd /tmp/run2 && /tmp/kai init && /tmp/kai capture .
    - sqlite3 /tmp/run2/.kai/db.sqlite "SELECT kind, payload FROM nodes ORDER BY kind, payload" > /tmp/nodes2.txt
    - sqlite3 /tmp/run2/.kai/db.sqlite "SELECT src, type, dst FROM edges ORDER BY src, type, dst" > /tmp/edges2.txt
    - diff /tmp/nodes1.txt /tmp/nodes2.txt || { echo "FAIL: node nondeterminism"; exit 1; }
    - diff /tmp/edges1.txt /tmp/edges2.txt || { echo "FAIL: edge nondeterminism"; exit 1; }
    - echo "PASS: determinism verified"
  artifacts:
    when: always
    paths:
      - /tmp/nodes1.txt
      - /tmp/nodes2.txt
      - /tmp/edges1.txt
      - /tmp/edges2.txt
    expire_in: 2 weeks

# Correctness: shadow mode — 0 false negatives
correctness:shadow:
  stage: correctness
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git
  script:
    - cd kai-cli
    - CGO_ENABLED=1 go test ./cmd/kai/
      -run "TestShadow_|TestSelection_|TestFalseNeg_"
      -v -count=1 -timeout 120s 2>&1 | tee /tmp/shadow.log
    - "! grep -q 'FALSE NEGATIVE' /tmp/shadow.log || { echo 'FAIL: false negatives detected'; exit 1; }"
    - echo "PASS: 0 false negatives"
  artifacts:
    when: always
    paths:
      - /tmp/shadow.log
    expire_in: 2 weeks

# Correctness: flaky classification
correctness:flaky:
  stage: correctness
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - cd kai-cli
    - CGO_ENABLED=1 go test ./cmd/kai/
      -run "TestFlaky_"
      -v -count=1 -timeout 60s

# Build kailab (data plane)
build:kailab:
  stage: build
  image: google/cloud-sdk:alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - *gcp_auth
  script:
    - docker build -t $KAILAB_IMAGE:$CI_COMMIT_SHA -t $KAILAB_IMAGE:latest -f kailab/Dockerfile .
    - docker push $KAILAB_IMAGE:$CI_COMMIT_SHA
    - docker push $KAILAB_IMAGE:latest
  only:
    - main
    - tags

# Build kailab-control (control plane)
build:kailab-control:
  stage: build
  image: google/cloud-sdk:alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - *gcp_auth
  script:
    - docker build -t $KAILAB_CONTROL_IMAGE:$CI_COMMIT_SHA -t $KAILAB_CONTROL_IMAGE:latest kailab-control/
    - docker push $KAILAB_CONTROL_IMAGE:$CI_COMMIT_SHA
    - docker push $KAILAB_CONTROL_IMAGE:latest
  only:
    - main
    - tags

# Build and release kai-cli binaries
# Uploads to GitLab Generic Package Registry
release:kai-cli:
  stage: release
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache gcc musl-dev git curl
  script:
    - cd kai-cli
    - VERSION=$(grep 'var Version' cmd/kai/main.go | cut -d'"' -f2)
    - echo "Building kai-cli v${VERSION}"
    - mkdir -p dist
    # Linux amd64 (native build on Alpine)
    - CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/kai-linux-amd64 ./cmd/kai
    - gzip -k dist/kai-linux-amd64
    # Upload to GitLab Package Registry
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file dist/kai-linux-amd64.gz \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kai-cli/${VERSION}/kai-linux-amd64.gz"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file dist/kai-linux-amd64.gz \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/kai-cli/latest/kai-linux-amd64.gz"
  only:
    - main
    - tags
  artifacts:
    paths:
      - kai-cli/dist/
    expire_in: 1 week

