apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kailab-ci

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - resource-quota.yaml
  - network-policy.yaml
  - deployment.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/kailayerhq/kailab-runner
    newName: ghcr.io/kailayerhq/kailab-runner
    newTag: latest
