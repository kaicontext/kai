name: CI

on:
  push:
    branches: [main]
    tags: ['*']

env:
  KAILAB_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/preplan/kailab
  KAILAB_CONTROL_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/preplan/kailab-control

jobs:
  test-kai-cli:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache gcc musl-dev
      - name: Run tests
        run: |
          cd kai-cli
          CGO_ENABLED=1 go test ./...

  test-kai-core:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache gcc musl-dev
      - name: Run tests
        run: |
          cd kai-core
          CGO_ENABLED=1 go test ./...

  # Correctness: regression + determinism + shadow + flaky tests
  correctness:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache gcc musl-dev git sqlite
      - name: Run correctness test suite
        run: |
          cd kai-cli
          CGO_ENABLED=1 go test ./cmd/kai/ \
            -run "TestGraph_|TestSelection_|TestFalseNeg_|TestShadow_|TestFlaky_|TestCLI_|TestPerf_" \
            -v -count=1 -timeout 120s
      - name: Determinism check
        run: |
          cd kai-cli
          CGO_ENABLED=1 go build -o /tmp/kai ./cmd/kai
          mkdir -p /tmp/fixture/src /tmp/fixture/tests
          printf 'export function add(a: number, b: number) { return a + b; }' > /tmp/fixture/src/utils.ts
          printf 'import { add } from "./utils";\nexport const result = add(1, 2);' > /tmp/fixture/src/app.ts
          printf 'import { result } from "../src/app";\ntest("works", () => expect(result).toBe(3));' > /tmp/fixture/tests/app.test.ts
          cp -r /tmp/fixture /tmp/run1 && cd /tmp/run1 && /tmp/kai init && /tmp/kai capture .
          sqlite3 .kai/db.sqlite "SELECT kind, payload FROM nodes ORDER BY kind, payload" > /tmp/n1.txt
          cp -r /tmp/fixture /tmp/run2 && cd /tmp/run2 && /tmp/kai init && /tmp/kai capture .
          sqlite3 .kai/db.sqlite "SELECT kind, payload FROM nodes ORDER BY kind, payload" > /tmp/n2.txt
          diff /tmp/n1.txt /tmp/n2.txt || { echo "FAIL: nondeterminism"; exit 1; }
          echo "PASS: determinism verified"

  test-kailab:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache gcc musl-dev
      - name: Run tests
        run: |
          cd kailab
          CGO_ENABLED=1 go test ./...

  test-kailab-control:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          cd kailab-control
          go test ./...

  build-kailab:
    needs: [test-kai-cli, test-kai-core, test-kailab, test-kailab-control]
    runs-on: ubuntu-latest
    container:
      image: google/cloud-sdk:alpine
    services:
      docker:
        image: docker:dind
    env:
      DOCKER_HOST: tcp://docker:2375
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        run: |
          apk add --no-cache docker-cli
          echo "${{ secrets.GCP_SERVICE_KEY }}" | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and push
        run: |
          docker build -t ${{ env.KAILAB_IMAGE }}:${{ github.sha }} -t ${{ env.KAILAB_IMAGE }}:latest -f kailab/Dockerfile .
          docker push ${{ env.KAILAB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.KAILAB_IMAGE }}:latest

  build-kailab-control:
    needs: [test-kai-cli, test-kai-core, test-kailab, test-kailab-control]
    runs-on: ubuntu-latest
    container:
      image: google/cloud-sdk:alpine
    services:
      docker:
        image: docker:dind
    env:
      DOCKER_HOST: tcp://docker:2375
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        run: |
          apk add --no-cache docker-cli
          echo "${{ secrets.GCP_SERVICE_KEY }}" | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and push
        run: |
          docker build -t ${{ env.KAILAB_CONTROL_IMAGE }}:${{ github.sha }} -t ${{ env.KAILAB_CONTROL_IMAGE }}:latest kailab-control/
          docker push ${{ env.KAILAB_CONTROL_IMAGE }}:${{ github.sha }}
          docker push ${{ env.KAILAB_CONTROL_IMAGE }}:latest

  release-kai-cli:
    needs: [test-kai-cli, test-kai-core, test-kailab, test-kailab-control]
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache gcc musl-dev git curl
      - name: Build and upload
        run: |
          cd kai-cli
          VERSION=$(grep 'var Version' cmd/kai/main.go | cut -d'"' -f2)
          echo "Building kai-cli v${VERSION}"
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/kai-linux-amd64 ./cmd/kai
          gzip -k dist/kai-linux-amd64
          curl --header "JOB-TOKEN: ${{ secrets.CI_JOB_TOKEN }}" \
               --upload-file dist/kai-linux-amd64.gz \
               "${{ secrets.CI_API_V4_URL }}/projects/${{ secrets.CI_PROJECT_ID }}/packages/generic/kai-cli/${VERSION}/kai-linux-amd64.gz"
          curl --header "JOB-TOKEN: ${{ secrets.CI_JOB_TOKEN }}" \
               --upload-file dist/kai-linux-amd64.gz \
               "${{ secrets.CI_API_V4_URL }}/projects/${{ secrets.CI_PROJECT_ID }}/packages/generic/kai-cli/latest/kai-linux-amd64.gz"

  deploy:
    needs: [build-kailab, build-kailab-control]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    container:
      image: google/cloud-sdk:alpine
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP and GKE
        run: |
          apk add --no-cache docker-cli
          echo "${{ secrets.GCP_SERVICE_KEY }}" | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud components install kubectl gke-gcloud-auth-plugin --quiet
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} --zone ${{ secrets.GKE_ZONE }}
      - name: Deploy to GKE
        run: |
          kubectl create namespace kailab --dry-run=client -o yaml | kubectl apply -f -
          sed -i "s|us-central1-docker.pkg.dev/preplanai/preplan/kailab:latest|${{ env.KAILAB_IMAGE }}:${{ github.sha }}|g" deploy/k8s/kailab-deployment.yaml
          sed -i "s|us-central1-docker.pkg.dev/preplanai/preplan/kailab-control:latest|${{ env.KAILAB_CONTROL_IMAGE }}:${{ github.sha }}|g" deploy/k8s/kailab-deployment.yaml
          kubectl apply -f deploy/k8s/kailab-deployment.yaml
          kubectl rollout status deployment/kailab -n kailab --timeout=300s
          kubectl rollout status deployment/kailab-control -n kailab --timeout=300s
