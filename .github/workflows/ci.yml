# GitHub Actions CI for Kai
# Tests, builds CLI binaries, and publishes to npm on tags

name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  # Test kai-cli (needs CGO for tree-sitter)
  test-kai-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: |
          cd kai-cli
          CGO_ENABLED=1 go test -timeout 5m -run '!TestRunCompletion' ./...

  # Test kai-core (needs CGO for tree-sitter)
  test-kai-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: |
          cd kai-core
          CGO_ENABLED=1 go test ./...

  # Build kai-cli for Linux
  build-kai-cli-linux:
    runs-on: ubuntu-latest
    needs: [test-kai-cli, test-kai-core]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build Linux amd64
        run: |
          cd kai-cli
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o kai-linux-amd64 ./cmd/kai
          gzip -kf kai-linux-amd64

      - name: Build Linux arm64
        run: |
          cd kai-cli
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -ldflags="-s -w" -o kai-linux-arm64 ./cmd/kai
          gzip -kf kai-linux-arm64

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-linux-amd64
          path: kai-cli/kai-linux-amd64.gz

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-linux-arm64
          path: kai-cli/kai-linux-arm64.gz

  # Build kai-cli for macOS
  build-kai-cli-darwin:
    runs-on: macos-latest
    needs: [test-kai-cli, test-kai-core]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build macOS arm64
        run: |
          cd kai-cli
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o kai-darwin-arm64 ./cmd/kai
          gzip -kf kai-darwin-arm64

      - name: Build macOS amd64
        run: |
          cd kai-cli
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o kai-darwin-amd64 ./cmd/kai
          gzip -kf kai-darwin-amd64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-darwin-arm64
          path: kai-cli/kai-darwin-arm64.gz

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-darwin-amd64
          path: kai-cli/kai-darwin-amd64.gz

  # Smoke test: end-to-end kai init against staging kai-server.
  # Gates release-kai-cli on tags so broken binaries never reach a GitHub Release.
  # Also runs on main pushes so we catch regressions on the rolling "latest"
  # build, but only release-kai-cli's tag-path actually depends on it.
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      KAI_SERVER: https://staging.kaicontext.com
      KAI_STAGING_RESET_TOKEN: ${{ secrets.KAI_STAGING_RESET_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build kai CLI from source
        run: |
          cd kai-cli
          CGO_ENABLED=1 go build -o /usr/local/bin/kai ./cmd/kai
          kai --version

      - name: Run smoke test
        run: scripts/smoke-init.sh

  # Create release with all binaries
  release-kai-cli:
    runs-on: ubuntu-latest
    needs: [build-kai-cli-linux, build-kai-cli-darwin, smoke]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release files
        run: |
          mkdir -p release
          cp dist/kai-linux-amd64/kai-linux-amd64.gz release/
          cp dist/kai-linux-arm64/kai-linux-arm64.gz release/
          cp dist/kai-darwin-arm64/kai-darwin-arm64.gz release/
          cp dist/kai-darwin-amd64/kai-darwin-amd64.gz release/
          ls -la release/

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish kai-mcp npm package on tags
  publish-npm:
    runs-on: ubuntu-latest
    needs: [release-kai-cli]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cd packages/kai-mcp
          node -e "const v=process.env.TAG.replace(/^v/,''); const p=require('./package.json'); p.version=v; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n'); const s=require('./server.json'); s.version=v; s.packages[0].version=v; require('fs').writeFileSync('server.json', JSON.stringify(s, null, 2)+'\n')"

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/kai-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
