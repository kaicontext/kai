name: Deploy CI Runner

on:
  push:
    branches: [main]
    paths:
      - 'kailab-control/cmd/kailab-runner/**'
      - 'kailab-control/internal/runner/**'
      - 'kailab-control/deploy/kubernetes/**'
      - '.github/workflows/deploy-runner.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kailayerhq/kailab-runner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./kailab-control
          file: kailab-control/deploy/kubernetes/Dockerfile.runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}

      - name: Update image tag
        run: |
          cd kailab-control/deploy/kubernetes
          kustomize edit set image ghcr.io/kailayerhq/kailab-runner=ghcr.io/kailayerhq/kailab-runner:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k kailab-control/deploy/kubernetes/

      - name: Wait for rollout
        run: |
          kubectl -n kailab-ci rollout status deployment/kailab-runner --timeout=120s

      - name: Verify deployment
        run: |
          kubectl -n kailab-ci get pods -l app.kubernetes.io/name=kailab-runner
